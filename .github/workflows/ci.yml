name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check Python syntax
        run: |
          python -m py_compile app.py
          python -m py_compile streamlit_app.py
          python -m py_compile ocr.py
          python -m py_compile ner.py
          python -m py_compile extractor.py
          python -m py_compile summarizer.py
          python -m py_compile visualizer.py
          python -m py_compile test_run.py
          python -m py_compile start_server.py


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test core modules
        run: |
          python -c "import ocr; print('ocr ok:', ocr._OCR_AVAILABLE)"
          python -c "import ner; print('ner ok')"
          python -c "import summarizer; print('summarizer ok')"
          python -c "import visualizer; print('visualizer ok')"
          python -c "import extractor; print('extractor ok')"
